# Nginx configuration for Matchus Telegram Mini App & Bot Server

user nginx;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Upstream Node.js application
    upstream node_app {
        server 127.0.0.1:3000;
    }

    # HTTP Server (port 80) - redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name 195444.com www.195444.com;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS Server (port 443)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name 195444.com www.195444.com;
    
        # Let's Encrypt certificate paths
        ssl_certificate /etc/letsencrypt/live/195444.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/195444.com/privkey.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Static files for Mini App with caching headers
        location /mini-app/ {
            alias /app/mini-app/;  # Path to mini-app static files in the container
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri $uri/ =404;
        }

        # Proxy API and Bot requests to Node.js
        location / {
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
