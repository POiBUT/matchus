# Nginx configuration for Matchus Telegram Mini App & Bot Server
# For production use, uncomment the HTTPS server block and provide valid SSL certificates

user nginx;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Upstream Node.js application
    upstream node_app {
        server 127.0.0.1:3000;
    }

    # HTTP Server (port 80)
    server {
        listen 80;
        server_name your-domain.com;  # Replace with your actual domain

        # Uncomment to redirect all HTTP traffic to HTTPS
        # return 301 https://$host$request_uri;

        # Proxy all requests to Node.js application
        location / {
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS Server (port 443) - Commented as SSL certificates are user-specific
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;  # Replace with your actual domain

    #     # SSL Certificate Configuration (replace paths with your actual certificate files)
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    #     # SSL Settings
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers HIGH:!aNULL:!MD5;

    #     # Static files for Mini App with caching headers
