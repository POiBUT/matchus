# Amvera Cloud Configuration for Matchus Telegram Mini App
version: '1.0'

# Build configuration
build:
  context: .
  dockerfile: Dockerfile

# Service configuration
service:
  name: matchus
  port: ${PORT:-3000}
  
  # Environment variables (set in Amvera dashboard)
  env:
    - TELEGRAM_BOT_TOKEN
    - WEBHOOK_URL
    - MINI_APP_URL
    - NODE_ENV=production
    - SESSION_TTL_MS=3600000

# Health check
healthcheck:
  path: /api
  port: 3000
  timeout: 5s
  interval: 30s

# Auto-deploy settings
deploy:
  branch: master
  auto_deploy: true
