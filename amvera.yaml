# Amvera Cloud Configuration for Matchus Telegram Mini App

meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"

build:
  artifacts:
    - path: /
      pattern: "*"
  skip: false

run:
  command: PORT=80 npm run bot
  persistenceMount: /data
  containerPort: 80
  servicePort: 80
